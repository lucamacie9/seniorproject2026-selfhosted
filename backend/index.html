<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Authentication Demo</title>
  <!-- Bootstrap CSS CDN for styling -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background: #f8f9fa;
      padding-top: 50px;
    }
    .auth-container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .nav-tabs .nav-link {
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="auth-container">
    <ul class="nav nav-tabs" id="authTab" role="tablist">
      <li class="nav-item">
        <a class="nav-link active" id="login-tab" data-toggle="tab" href="#login" role="tab">Login</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" id="signup-tab" data-toggle="tab" href="#signup" role="tab">Sign Up</a>
      </li>
    </ul>
    <div class="tab-content" id="authTabContent">
      <!-- Login Form -->
      <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
        <h3 class="mt-3">Login</h3>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email:</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="Enter email" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password:</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <div id="loginResult" class="mt-3"></div>
      </div>
      
      <!-- Sign Up Form -->
      <div class="tab-pane fade" id="signup" role="tabpanel" aria-labelledby="signup-tab">
        <h3 class="mt-3">Sign Up</h3>
        <form id="signupForm">
          <div class="form-group">
            <label for="signupName">Name:</label>
            <input type="text" id="signupName" class="form-control" placeholder="Enter full name" required>
          </div>
          <div class="form-group">
            <label for="signupEmail">Email:</label>
            <input type="email" id="signupEmail" class="form-control" placeholder="Enter email" required>
          </div>
          <div class="form-group">
            <label for="signupPassword">Password:</label>
            <input type="password" id="signupPassword" class="form-control" placeholder="Enter password" required>
          </div>
          <div class="form-group">
            <label for="signupRole">Role:</label>
            <select id="signupRole" class="form-control" required>
              <option value="student">Student</option>
              <option value="director">Director</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button type="submit" class="btn btn-success btn-block">Sign Up</button>
        </form>
        <div id="signupResult" class="mt-3"></div>
      </div>
    </div>
  </div>
</div>

<!-- jQuery and Bootstrap JS CDN for tabs functionality -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Login Form Submission
  document.getElementById('loginForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    fetch('http://localhost:8080/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    })
    .then(response => response.text())
    .then(data => {
      document.getElementById('loginResult').innerText = data;
    })
    .catch(error => {
      document.getElementById('loginResult').innerText = "Error: " + error;
    });
  });

  // Sign Up Form Submission
  document.getElementById('signupForm').addEventListener('submit', function(event) {
    event.preventDefault();
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const role = document.getElementById('signupRole').value;

    fetch('http://localhost:8080/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, email: email, password: password, role: role })
    })
    .then(response => response.text())
    .then(data => {
      document.getElementById('signupResult').innerText = data;
    })
    .catch(error => {
      document.getElementById('signupResult').innerText = "Error: " + error;
    });
  });
</script>

</body>
</html>
