<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Institution & Program Selection - Transfer Credit Match</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: #F8F9FA;
      padding-top: 60px;
    }
    .director-header-overlay {
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .director-header {
      position: relative;
      height: 300px;
      background: url('https://d13kjxnqnhcmn2.cloudfront.net/AcuCustom/Sitename/DAM/055/Uni_students_-_Main.png') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      color: white;
    }
    .director-header::after {
      content: "Select Institution & Program";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Merriweather', serif;
      font-size: 48px;
      font-weight: 700;
      z-index: 1;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .selection-card {
      background-color: #ffffff;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <!-- Navbar (aligned with other pages) -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-black fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Transfer Credit Match</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="auth.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header banner -->
  <div class="director-header">
    <div class="director-header-overlay"></div>
  </div>

  <!-- Selection component -->
  <div class="container my-5">
    <div class="selection-card">
      <h3 class="mb-3">Plan Your Transfer Path</h3>
      <p class="text-muted mb-4">
        Choose your <strong>current institution</strong>, your <strong>target institution</strong>, and the
        <strong>target program</strong> you want to transfer into.
      </p>

      <!-- Institutions row -->
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <h5>Current Institution</h5>
          <label for="currentInstitutionSelect" class="form-label">Current Institution</label>
          <select id="currentInstitutionSelect" class="form-select">
            <option value="">Loading institutions...</option>
          </select>
        </div>
        <div class="col-md-6">
          <h5>Target Institution</h5>
          <label for="targetInstitutionSelect" class="form-label">Target Institution</label>
          <select id="targetInstitutionSelect" class="form-select" disabled>
            <option value="">Select Institution</option>
            <option value="__default_roosevelt__" selected>Roosevelt University</option>
            <option value="" disabled>Loading institutions...</option>
          </select>
        </div>
      </div>

      <!-- Target program row (depends on target institution) -->
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <h5>Target Program</h5>
          <label for="targetProgramSelect" class="form-label">Program at Target Institution</label>
          <select id="targetProgramSelect" class="form-select" disabled>
            <option value="">Select a target institution first</option>
          </select>
        </div>
      </div>

      <!-- Summary / confirmation -->
      <div class="mt-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
        <button id="confirmSelectionBtn" class="btn btn-primary" disabled>
          Confirm Transfer Goal
        </button>
        <div id="selectionSummary" class="text-muted small"></div>
      </div>
    </div>
  </div>

  <footer class="bg-success bg-gradient text-white text-center py-0.5">
    <p>© 2025 Transfer Credit Match. All Rights Reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Simple reusable initializer so this logic can be copy-pasted into other pages if needed.
    function initInstitutionProgramSelector(options) {
      const {
        currentInstitutionSelectId = 'currentInstitutionSelect',
        targetInstitutionSelectId = 'targetInstitutionSelect',
        targetProgramSelectId = 'targetProgramSelect',
        confirmButtonId = 'confirmSelectionBtn',
        summaryElementId = 'selectionSummary',
        baseApiUrl = 'http://localhost:8080/api'
      } = options || {};

      const currentInstitutionSelect = document.getElementById(currentInstitutionSelectId);
      const targetInstitutionSelect = document.getElementById(targetInstitutionSelectId);
      const targetProgramSelect = document.getElementById(targetProgramSelectId);
      const confirmBtn = document.getElementById(confirmButtonId);
      const summaryEl = document.getElementById(summaryElementId);

      let allPrograms = [];
      let institutionsById = {};
      const defaultTargetInstitutionName = 'Roosevelt University';

      function setSummary(text, isError) {
        if (!summaryEl) return;
        summaryEl.textContent = text;
        summaryEl.classList.toggle('text-danger', !!isError);
      }

      function populateInstitutions(institutions) {
        institutionsById = {};
        const baseOption = '<option value="">Select Institution</option>';

        currentInstitutionSelect.innerHTML = baseOption;
        targetInstitutionSelect.innerHTML = baseOption;

        let defaultTargetInstitutionId = null;

        institutions.forEach(inst => {
          institutionsById[String(inst.institutionId)] = inst;
          const opt = document.createElement('option');
          opt.value = inst.institutionId;
          opt.textContent = inst.name + (inst.location ? ' (' + inst.location + ')' : '');
          currentInstitutionSelect.appendChild(opt.cloneNode(true));
          targetInstitutionSelect.appendChild(opt);

          if (
            !defaultTargetInstitutionId &&
            typeof inst.name === 'string' &&
            inst.name.toLowerCase() === defaultTargetInstitutionName.toLowerCase()
          ) {
            defaultTargetInstitutionId = String(inst.institutionId);
          }
        });

        // If Roosevelt University exists, set it as the default target institution
        if (defaultTargetInstitutionId) {
          targetInstitutionSelect.value = defaultTargetInstitutionId;
          const changeEvent = new Event('change');
          targetInstitutionSelect.dispatchEvent(changeEvent);
        }
      }

      function populateTargetProgramsForInstitution(institutionId) {
        targetProgramSelect.innerHTML = '<option value="">Select Program</option>';
        const filtered = allPrograms.filter(p => String(p.institutionId) === String(institutionId));
        if (filtered.length === 0) {
          targetProgramSelect.innerHTML = '<option value="">No programs for this institution</option>';
          targetProgramSelect.disabled = true;
          confirmBtn.disabled = true;
          return;
        }
        filtered.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id || p.programId || p.programName;
          opt.textContent = p.programName + ' (Institution ID: ' + p.institutionId + ')';
          targetProgramSelect.appendChild(opt);
        });
        targetProgramSelect.disabled = false;
        confirmBtn.disabled = !targetProgramSelect.value;
      }

      // Load data from backend
      Promise.all([
        fetch(baseApiUrl + '/institutions').then(r => r.json()),
        fetch(baseApiUrl + '/programs').then(r => r.json())
      ])
        .then(([institutions, programs]) => {
          allPrograms = programs || [];
          populateInstitutions(institutions || []);
          currentInstitutionSelect.disabled = false;
          targetInstitutionSelect.disabled = false;
          targetProgramSelect.disabled = true;
          confirmBtn.disabled = true;
          setSummary('Select your current and target institutions, then a target program.');
        })
        .catch(err => {
          setSummary('Error loading institutions/programs: ' + err, true);
          currentInstitutionSelect.innerHTML = '<option value="">Unable to load institutions</option>';
          targetInstitutionSelect.innerHTML = '<option value="">Unable to load institutions</option>';
          targetProgramSelect.innerHTML = '<option value="">Unable to load programs</option>';
          currentInstitutionSelect.disabled = true;
          targetInstitutionSelect.disabled = true;
          targetProgramSelect.disabled = true;
          confirmBtn.disabled = true;
        });

      // When target institution changes, load its programs
      targetInstitutionSelect.addEventListener('change', () => {
        const instId = targetInstitutionSelect.value;
        if (!instId) {
          targetProgramSelect.innerHTML = '<option value="">Select a target institution first</option>';
          targetProgramSelect.disabled = true;
          confirmBtn.disabled = true;
          setSummary('Select a target institution to see available programs.');
          return;
        }
        populateTargetProgramsForInstitution(instId);
        setSummary('');
      });

      targetProgramSelect.addEventListener('change', () => {
        confirmBtn.disabled = !targetProgramSelect.value;
      });

      confirmBtn.addEventListener('click', () => {
        const currentInstId = currentInstitutionSelect.value;
        const targetInstId = targetInstitutionSelect.value;
        const targetProgValue = targetProgramSelect.value;

        if (!currentInstId || !targetInstId || !targetProgValue) {
          setSummary('Please select current institution, target institution, and a target program.', true);
          return;
        }
        const currentInst = institutionsById[String(currentInstId)];
        const targetInst = institutionsById[String(targetInstId)];
        const targetProgram = allPrograms.find(p =>
          String(p.institutionId) === String(targetInstId) &&
          (String(p.id || p.programId || p.programName) === String(targetProgValue)
        ));

        const currentLabel = currentInst
          ? currentInst.name + (currentInst.location ? ' (' + currentInst.location + ')' : '')
          : 'Institution ' + currentInstId;

        const targetLabel = targetInst
          ? targetInst.name + (targetInst.location ? ' (' + targetInst.location + ')' : '')
          : 'Institution ' + targetInstId;

        const targetProgramLabel = targetProgram ? targetProgram.programName : 'Program ' + targetProgValue;

        setSummary(
          'Current: ' + currentLabel +
          ' → Target: ' + targetLabel +
          ' | Target Program: ' + targetProgramLabel
        );

        // Hook for integration: if you later want to navigate
        // or call another API with this selection, you can do it here.
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      initInstitutionProgramSelector();
    });
  </script>
</body>
</html>
