<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login / Sign Up</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .director-header-overlay {
      width: 100%;
      height: 100%;
      z-index: 0;
}
    .director-header {
      position: relative;
      height: 300px;
      background: url('https://d13kjxnqnhcmn2.cloudfront.net/AcuCustom/Sitename/DAM/055/Uni_students_-_Main.png') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      color: white;
    }    .director-header::after {
      content: "Welcome to Transfer Credit Match"; /* Change text here */
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Merriweather', serif;
      font-size: 48px;
      font-weight: 700;
      z-index: 1;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-black">
    <div class="container">
      <a class="navbar-brand" href="index.html">Transfer Credit Match</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="auth.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <!--header banner-->
  <div class="director-header">
    <div class="director-header-overlay"></div>
  </div>
  <!-- Tabs for Login / Sign Up -->
  <div class="container mt-4">
    <ul class="nav nav-tabs" id="authTab" role="tablist">
      <li class="nav-item">
        <a class="nav-link active" id="login-tab" data-bs-toggle="tab" href="#login" role="tab">Login</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" id="signup-tab" data-bs-toggle="tab" href="#signup" role="tab">Sign Up</a>
      </li>
    </ul>
    <div class="tab-content" id="authTabContent">
      <!-- Login Form -->
      <div class="tab-pane fade show active p-3" id="login" role="tabpanel" aria-labelledby="login-tab">
        <h3>Login</h3>
        <form id="loginForm">
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Email</label>
            <input type="email" id="loginEmail" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="loginPassword" class="form-label">Password</label>
            <input type="password" id="loginPassword" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <div id="loginResult" class="mt-2"></div>
      </div>
      <!-- Sign Up Form -->
      <div class="tab-pane fade p-3" id="signup" role="tabpanel" aria-labelledby="signup-tab">
        <h3>Sign Up</h3>
        <form id="signupForm">
          <div class="mb-3">
            <label for="signupName" class="form-label">Name</label>
            <input type="text" id="signupName" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="signupEmail" class="form-label">Email</label>
            <input type="email" id="signupEmail" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="signupPassword" class="form-label">Password</label>
            <input type="password" id="signupPassword" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="signupRole" class="form-label">Role</label>
            <select id="signupRole" class="form-select">
              <option value="student">Student</option>
              <option value="director">Director</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button type="submit" class="btn btn-success">Sign Up</button>
        </form>
        <div id="signupResult" class="mt-2"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // LOGIN FORM
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;      fetch('http://localhost:8080/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      })
      .then(response => response.text()).then(data => {
  document.getElementById('loginResult').innerText = data;      // case-insensitive check for roles
      if (data.toLowerCase().includes("role: director")) {
        window.location.href = "director_view.html";
      } else if (data.toLowerCase().includes("role: student")) {
        window.location.href = "student_view.html";
      } else if (data.toLowerCase().includes("role: admin")) {
        window.location.href = "admin_dashboard.html";
      } else {
        console.warn("Login succeeded but unrecognized role.");
      }
})
      .catch(error => {
        document.getElementById('loginResult').innerText = "Error: " + error;
      });
    });
    // SIGN UP FORM
    document.getElementById('signupForm').addEventListener('submit', function(event) {
      event.preventDefault();
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const role = document.getElementById('signupRole').value;      fetch('http://localhost:8080/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, role })
      })
      .then(response => response.text())
      .then(data => {
        document.getElementById('signupResult').innerText = data;
      })
      .catch(error => {
        document.getElementById('signupResult').innerText = "Error: " + error;
      });
    });
  </script>
<div class="my-5"></div>
<footer class="bg-success bg-gradient text-white text-center py-0.5">
  <p>© 2025 Transfer Credit Match. All Rights Reserved.</p>
</footer>
</body>
</html>
